<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalixlist — Geometry Dash Demonlist</title>
    <!-- Font Inter per la tipografia della UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #07090e;
            --navbar-bg: #0b0e14;
            --panel-bg: #111622;
            --card-bg: #141b29;
            --panel-border: #1d2636;
            --text-primary: #ffffff;
            --text-secondary: #7e8b9b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --input-bg: #121622;
            --font-sans: 'Inter', sans-serif;
            --transition-speed: 0.15s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.5;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Elementi decorativi di sfondo */
        .bg-decorations {
            position: fixed;
            top: 64px;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            opacity: 0.12;
        }

        .decor-left {
            width: 250px;
            height: 80%;
            background: radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 70%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
        }

        .decor-right {
            width: 300px;
            height: 80%;
            background: radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.1), transparent 70%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 40px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--navbar-bg);
            border-bottom: 1px solid var(--panel-border);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .navbar-brand svg {
            fill: var(--accent-blue);
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .navbar-menu a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: color var(--transition-speed);
        }

        .navbar-menu a:hover, .navbar-menu a.active {
            color: var(--text-primary);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .nav-icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: color var(--transition-speed);
        }

        .nav-icon-btn:hover {
            color: var(--text-primary);
        }

        /* Contenitore App */
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1rem;
            flex-grow: 1;
        }

        /* Viste */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Filtri & Ricerca */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .filter-btn-blue {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .search-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .main-search-input {
            width: 100%;
            height: 42px;
            background-color: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0 14px 0 42px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }

        .main-search-input:focus {
            border-color: var(--accent-blue);
        }

        .view-toggles {
            display: flex;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 4px;
            gap: 4px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .toggle-btn.active {
            background-color: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
        }

        /* Header Categoria Lista */
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.5rem 0;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .category-header .range {
            color: var(--accent-red);
            background-color: rgba(239, 68, 68, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .category-header .title {
            color: var(--text-secondary);
        }

        .category-header::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background-color: var(--panel-border);
        }

        /* MODALITÀ GRIGLIA A 4 COLONNE */
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .grid-cell {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .grid-cell:hover {
            border-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .grid-rank-box {
            background-color: #1d2331;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 700;
            width: 28px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .grid-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grid-badge-new {
            position: absolute;
            top: -4px;
            right: 8px;
            background-color: var(--accent-orange);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        /* DETTAGLIO LIVELLO */
        .detail-layout {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            align-self: flex-start;
            cursor: pointer;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .detail-top {
            text-align: center;
            margin-bottom: 10px;
        }

        .detail-title-row {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .detail-title-row span {
            color: var(--accent-blue);
        }

        .detail-creator-row {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .verified-badge {
            background-color: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
        }

        .detail-quote {
            font-style: italic;
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.85rem;
            margin: 10px 0;
        }

        .detail-video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            background-color: #000;
        }

        .detail-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Configurazione griglia asimmetrica per i dati del livello */
        .stats-grid-row-1 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stats-grid-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .stats-grid-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: border-color var(--transition-speed);
        }

        .stat-card:hover {
            border-color: var(--accent-blue);
        }

        .stat-card .lbl {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-card .val {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-card .sub-click {
            font-size: 0.65rem;
            color: var(--accent-blue);
            margin-top: 2px;
        }

        .action-buttons-row {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            background-color: #1e293b;
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color var(--transition-speed);
        }

        .action-btn:hover {
            background-color: #334155;
        }

        /* Accordion posizione */
        .position-history-accordion {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .accordion-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
        }

        .accordion-content {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease-out, padding 0.2s ease-out;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 0 solid var(--panel-border);
        }

        .accordion-content.open {
            padding: 12px 16px;
            max-height: 150px;
            border-top: 1px solid var(--panel-border);
        }

        /* Pannello dei Record */
        .records-container {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 16px;
        }

        .records-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .records-header svg {
            color: var(--accent-orange);
        }

        .records-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .no-records-box {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            gap: 8px;
        }

        .no-records-box svg {
            color: var(--panel-border);
        }

        .records-pagination {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

        .records-page-btn {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .records-page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* VISTA STATS VIEWER */
        .stats-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .stats-sidebar {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stats-dropdown-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            width: 100%;
        }

        .players-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .player-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s;
        }

        .player-item:hover, .player-item.active {
            border-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .player-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-item-rank {
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 24px;
        }

        .player-item-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .player-item-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-item-score {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .flag-icon {
            font-size: 1.1rem;
        }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 8px;
        }

        .page-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            flex: 1;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .player-detail-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 24px;
        }

        .player-detail-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .player-detail-flag {
            font-size: 2.8rem;
            line-height: 1;
        }

        .player-detail-name {
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .p-stat-box {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .p-stat-icon {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
        }

        .p-stat-details {
            display: flex;
            flex-direction: column;
        }

        .p-stat-val {
            font-size: 1.25rem;
            font-weight: 800;
        }

        .p-stat-lbl {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .hardest-banner {
            background-color: rgba(249, 115, 22, 0.05);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .hardest-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hardest-icon {
            color: var(--accent-orange);
            font-size: 1.2rem;
        }

        .hardest-title-group {
            display: flex;
            flex-direction: column;
        }

        .hardest-lbl {
            font-size: 0.75rem;
            color: var(--accent-orange);
            font-weight: 700;
            text-transform: uppercase;
        }

        .hardest-name {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .hardest-right {
            color: var(--text-secondary);
        }

        .main-levels-box {
            background-color: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 16px;
        }

        .box-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .box-title-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .box-title-left svg {
            color: var(--accent-red);
        }

        .box-counter {
            background-color: var(--panel-border);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .level-tag {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .level-tag:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        /* FOOTER REPLICA */
        .footer {
            background-color: var(--navbar-bg);
            border-top: 1px solid var(--panel-border);
            padding: 2rem 2rem 1.5rem 2rem;
            margin-top: auto;
            position: relative;
            z-index: 2;
        }

        .footer-main {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--panel-border);
        }

        .footer-logo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-logo-title {
            display: flex;
            align-items: center;
            gap: 8px;

        // Routing SPA (Single Page Application)
        function switchView(viewName, parameterId = null) {
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.navbar-menu a').forEach(link => {
                link.classList.remove('active');
            });

            if (viewName === 'grid') {
                document.getElementById('view-grid').classList.add('active');
                document.getElementById('nav-classic').classList.add('active');
                renderGrid();
            } else if (viewName === 'detail') {
                document.getElementById('view-detail').classList.add('active');
                renderDetail(parameterId);
            } else if (viewName === 'stats') {
                document.getElementById('view-stats').classList.add('active');
                document.getElementById('nav-stats').classList.add('active');
                renderPlayersList();
                renderPlayerDetail();
            }
        }

        // --- SCHERMATA GRIGLIA ---
        const gridContainer = document.getElementById('levels-grid-container');
        const gridRange = document.getElementById('grid-range');
        const searchInput = document.getElementById('level-search');

        function renderGrid(filteredLevels = levels) {
            // Aggiorna l'intervallo mostrato in base ai livelli reali caricati
            gridRange.innerText = `#1 - #${levels.length}`;

            gridContainer.innerHTML = '';
            filteredLevels.forEach(lvl => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.innerHTML = `
                    ${lvl.isNew ? '<span class="grid-badge-new">New</span>' : ''}
                    <div class="grid-rank-box">${lvl.rank}</div>
                    <div class="grid-name">${lvl.name}</div>
                `;
                cell.addEventListener('click', () => {
                    switchView('detail', lvl.rank);
                });
                gridContainer.appendChild(cell);
            });
        }

        // Ricerca dei livelli
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = levels.filter(lvl => lvl.name.toLowerCase().includes(query));
            renderGrid(filtered);
        });

            navigator.clipboard.writeText(id).then(() => {
                const el = document.getElementById(elementId);
                const prevText = el.innerText;
                el.innerText = "Copied!";
                setTimeout(() => {
                    el.innerText = prevText;
                }, 1500);
            });

                    renderPlayersList(filteredPlayers);

                        <div class="box-title-left">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                            </svg>
                            <span>Main levels</span>
                        </div>
                        <span class="box-counter">${player.completed.length}</span>
                    </div>
                    <div class="tags-container">
                        ${player.completed.map(levelName => `
                            <span class="level-tag" onclick="alert('Informazioni su ${levelName}')">${levelName}</span>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        playerSearchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = players.filter(p => p.name.toLowerCase().includes(query));
            renderPlayersList(filtered);
        });

        // Avvio Iniziale
        renderGrid();
    </script>
</body>
</html>
