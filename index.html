<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalixlist — Geometry Dash Demonlist</title>
    <!-- Font Inter per uno stile moderno e pulito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #08090c;
            --navbar-bg: #0e1017;
            --panel-bg: #12151e;
            --panel-border: #1e2330;
            --panel-border-hover: #2d3548;
            --text-primary: #ffffff;
            --text-secondary: #8f96a3;
            --accent-color: #ff6a00;
            --accent-gradient: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%);
            --red-demon: #ff3e3e;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --transition-speed: 0.2s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar Personalizzata */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--panel-border-hover);
        }

        /* Header / Navigation Bar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--navbar-bg);
            border-bottom: 1px solid var(--panel-border);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .navbar-brand span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .navbar-menu a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color var(--transition-speed);
        }

        .navbar-menu a:hover, .navbar-menu a.active {
            color: var(--text-primary);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .discord-btn {
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: opacity var(--transition-speed);
        }

        .discord-btn:hover {
            opacity: 0.9;
        }

        /* Main Layout Grid */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            height: calc(100vh - 64px);
        }

        /* Colonna di Sinistra: La Lista dei Livelli */
        .list-sidebar {
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            overflow: hidden;
            height: 100%;
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--panel-border);
            background-color: rgba(255, 255, 255, 0.01);
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition-speed);
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .sidebar-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .level-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--panel-border);
            cursor: pointer;
            transition: background-color var(--transition-speed);
            position: relative;
        }

        .level-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .level-item.active {
            background-color: rgba(255, 106, 0, 0.06);
            border-left: 4px solid var(--accent-color);
            padding-left: calc(1.25rem - 4px);
        }

        .level-rank {
            font-weight: 800;
            font-size: 1.1rem;
            min-width: 50px;
            color: var(--text-secondary);
        }

        .level-item.active .level-rank {
            color: var(--accent-color);
        }

        .level-info-meta {
            display: flex;
            flex-direction: column;
        }

        .level-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .level-creator {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Colonna di Destra: Dettaglio del Livello Selezionato */
        .content-panel {
            overflow-y: auto;
            height: 100%;
            padding-right: 5px;
        }

        .detail-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 1.5rem;
        }

        .detail-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .detail-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
        }

        .detail-subtitle span {
            color: var(--text-primary);
            font-weight: 600;
        }

        .demon-badge {
            background-color: rgba(255, 62, 62, 0.1);
            border: 1px solid var(--red-demon);
            color: var(--red-demon);
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Video Container (Proporzione 16:9) */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            margin-bottom: 2rem;
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Griglia delle Informazioni Tecniche */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 1.25rem;
            text-align: center;
        }

        .info-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Sezione Record / Victor */
        .records-section {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .records-table th, .records-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--panel-border);
        }

        .records-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .records-table tbody tr {
            transition: background-color var(--transition-speed);
        }

        .records-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.01);
        }

        .record-proof-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .record-proof-link:hover {
            text-decoration: underline;
        }

        /* Sezione Pulsanti Submitter */
        .submit-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .submit-record-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity var(--transition-speed);
        }

        .submit-record-btn:hover {
            opacity: 0.9;
        }

        /* Responsività */
        @media (max-width: 992px) {
            .main-container {
                grid-template-columns: 1fr;
                height: auto;
                padding: 1rem;
            }

            .list-sidebar {
                height: 400px;
            }

            .navbar {
                padding: 0 1rem;
            }

            .navbar-menu {
                display: none; /* In produzione verrebbe sostituito da un menu hamburger */
            }
        }
    </style>
</head>

            },
            {
                rank: 9,
                name: "BOOBAWAMBA",
                creator: "Akunakunn",
                verifier: "Akunakunn",
                publisher: "Akunakunn",
                levelId: "102345678",
                objects: "85,400",
                difficulty: "Extreme Demon",
                points: "206.0",
                youtubeId: "say-Booba",
                victors: []
            },
            {
                rank: 10,
                name: "Every End",
                creator: "MindCap",
                verifier: "Zoink",
                publisher: "MindCap",
                levelId: "95123456",
                objects: "165,000",
                difficulty: "Extreme Demon",
                points: "200.5",
                youtubeId: "say-EveryEnd",
                victors: [
                    { name: "Zoink", progress: "100%", proofUrl: "https://youtube.com", hz: "360Hz" },
                    { name: "Trick", progress: "100%", proofUrl: "https://youtube.com", hz: "360Hz" }
                ]
            }
        ];

        let selectedLevelIndex = 0;

        // Riferimenti DOM
        const sidebarContainer = document.getElementById('levels-list-container');
        const detailPanel = document.getElementById('detail-panel');
        const searchInput = document.getElementById('search-input');

        // Render della lista a sinistra
        function renderSidebar(filteredLevels = levelsData) {
            sidebarContainer.innerHTML = '';
            filteredLevels.forEach((level) => {
                const li = document.createElement('li');
                li.className = `level-item ${level.rank - 1 === selectedLevelIndex ? 'active' : ''}`;
                li.innerHTML = `
                    <div class="level-rank">#${level.rank}</div>
                    <div class="level-info-meta">
                        <span class="level-name">${level.name}</span>
                        <span class="level-creator">di ${level.creator}</span>
                    </div>
                `;
                li.addEventListener('click', () => {
                    // Trova l'indice corretto basato sul livello globale
                    selectedLevelIndex = level.rank - 1;
                    renderSidebar(filteredLevels);
                    renderDetailCard();
                });
                sidebarContainer.appendChild(li);
            });
        }

        // Render della scheda dettagliata
        function renderDetailCard() {
            const level = levelsData[selectedLevelIndex];
            if (!level) return;

            // Generazione della tabella dei victors/record
            let victorsHtml = '';
            if (level.victors.length > 0) {
                victorsHtml = `
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Progresso</th>
                                <th>Frequenza</th>
                                <th>Prova Video</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${level.victors.map(v => `
                                <tr>
                                    <td style="font-weight: 600;">${v.name}</td>
                                    <td>${v.progress}</td>
                                    <td style="color: var(--text-secondary);">${v.hz}</td>
                                    <td><a href="${v.proofUrl}" class="record-proof-link" target="_blank">Guarda</a></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } else {
                victorsHtml = `<p style="color: var(--text-secondary); text-align: center; padding: 2rem 0;">Nessun record registrato per questo livello.</p>`;
            }

            detailPanel.innerHTML = `
                <div class="detail-card">
                    <div class="detail-header">
                        <div class="detail-title">
                            <h1>${level.name}</h1>
                            <p class="detail-subtitle">Sviluppato da <span>${level.creator}</span> e verificato da <span>${level.verifier}</span></p>
                        </div>
                        <div class="demon-badge">
                            <!-- Icona demone in SVG -->
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L9 6H15L12 2Z" fill="currentColor"/>
                                <circle cx="8" cy="13" r="1.5" fill="#000"/>
                                <circle cx="16" cy="13" r="1.5" fill="#000"/>
                                <path d="M10 17C10 17 11 18 12 18C13 18 14 17 14 17" stroke="#000" stroke-linecap="round"/>
                            </svg>
                            ${level.difficulty}
                        </div>
                    </div>

                    <!-- Embed Video Player -->
                    <div class="video-wrapper">
                        <!-- Un player YouTube di esempio per simulare i video originali di Pointercrate -->
                        <iframe src="https://www.youtube.com/embed/${level.youtubeId}" title="YouTube video player" allowfullscreen></iframe>
                    </div>

                    <!-- Box Dati Livello -->
                    <div class="info-grid">
                        <div class="info-box">
                            <div class="info-label">ID Livello</div>
                            <div class="info-value">${level.levelId}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Oggetti</div>
                            <div class="info-value">${level.objects}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Punti Lista</div>
                            <div class="info-value" style="color: var(--accent-color);">${level.points}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Pubblicato</div>
                            <div class="info-value" style="font-size: 0.95rem;">${level.publisher}</div>
                        </div>
                    </div>
                </div>

                <!-- Lista Victors -->
                <div class="records-section">
                    <div class="section-title">
                        <span>Record Accettati (${level.victors.length})</span>
                    </div>
                    ${victorsHtml}
                    <div class="submit-container">
                        <button class="submit-record-btn" onclick="alert('Funzionalità di invio record non configurata su server locale.')">Invia Record</button>

                </div>

        // Gestione Ricerca / Filtro
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = levelsData.filter(level => 
                level.name.toLowerCase().includes(query) || 
                level.creator.toLowerCase().includes(query) || 
                level.levelId.includes(query)
            );
            renderSidebar(filtered);
        });

        // Avvio Iniziale della pagina
        renderSidebar();
        renderDetailCard();
    </script>
</body>
</html>
